server:
  port: ${SERVER_PORT:8087}

spring:
  application:
    name: service-categories
  profiles:
    active: ${SPRING_PROFILE:local}

# =========================
# Profil LOCAL
# =========================
---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5447/${POSTGRES_CATEGORIES_DB:db_categories}
    username: ${POSTGRES_CATEGORIES_USER:svc_categories}
    password: ${POSTGRES_CATEGORIES_PASSWORD:categories_pass_2026}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:2}
      idle-timeout: ${DB_IDLE_TIMEOUT:30000}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:20000}
  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:update}
    show-sql: ${SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

