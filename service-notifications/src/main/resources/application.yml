server:
  port: ${SERVER_PORT:8086}

spring:
  application:
    name: service-notifications

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5446}/${DB_NAME:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Africa/Douala
    open-in-view: false

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:}
    password: ${RABBITMQ_PASSWORD:}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 2000
          max-attempts: 3
          multiplier: 2.0
        default-requeue-rejected: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# --- Messaging ServiLoc (RabbitMQ) ---
serviloc:
  messaging:
    exchange: serviloc.events
    queue: notifications.queue
    dlq: notifications.dlq
    dlx: serviloc.events.dlx
    routing-keys:
      - user.*
      - provider.*
      - agent.*
      - demand.*
      - negotiation.*
      - payment.*
      - litige.*
      - mission.*
  internal:
    # Jeton machine-à-machine partagé entre microservices (cf. INTERNAL_TOKEN)
    token: ${INTERNAL_TOKEN:}

  # --- Canaux de notification sortants ---
  firebase:
    enabled: ${FCM_ENABLED:true}
    credentials-path: ${FCM_CREDENTIALS_PATH:firebase-service-account.json}

  sms:
    provider: ${SMS_PROVIDER:sandbox}
    api-key: ${SMS_API_KEY:}
    sender-id: ${SMS_SENDER_ID:ServiLoc}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    doc-expansion: none
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    path: /api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.serviloc.notifications: ${LOG_LEVEL:INFO}
